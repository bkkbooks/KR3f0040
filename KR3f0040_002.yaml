body:
  text: 緝古算經一假令天正十一月朔夜半日在斗十度七百分度之四百八十以章歲為母朔月行定分九千朔日定小餘一萬日法二萬章歲七百亦名行分法今不取加時日度問天正朔夜半之時月在何處推朔夜半月度舊術要須加時日度自古先儒雖復修撰改制意見甚衆並未得算妙有理不盡考校尤難臣每日夜思量常以此理屈滯恐後代無人知者今奉敕造曆因即改制為此新術舊推日度之術已得朔夜半日度仍須更求加時日度然知月處臣今作新術但得朔夜半日度不須加時日度即知月處此新術比於舊術一年之中十二倍省功使學者易知答曰在斗四度七百分度之五百三十術曰推朔夜半月度新術不須加時日度有定小餘乃可用之以章歲減朔月行定分餘以乘朔日定小餘滿日法而一為先行分不盡者半法已上收成一已下者棄之若先行分滿日行分而一為度分以減朔日夜半日所在度分若度分不足減加往宿度其分不足減者退一度為行分而減之餘即朔日夜半月行所在度及分也凡入曆當月行定分即是月一日之行分但此定分滿章歲而一為度凡日一日行一度然則章歲者即是日之一日行分也今按九章均輸篇有犬追兔術與此術相似彼問犬走一百步兔走七十步令兔先走七十五步犬始追之問幾何步追及答曰二百五十步追及彼術曰以兔走減犬走餘者為法又以犬走乘兔先走為實實如法而一即得追及步數此術亦然何者假令月行定分九千章歲七百即是日行七百分月行九千分令日月行數相減餘八千三百分者是日先行之數然月始追之必用一日而相及也今定小餘者亦是日月相及之日分假令定小餘一萬即相及定分此乃無對為數其日法者亦是相及之分此又同數為有八千三百是先行分也斯則異矣但用日法除之得四千一百五十即先行分故以夜半之時日在月前月在日後以日月相去之數四千一百五十減日行所在度分即月夜半所在度分也二假令太史造仰觀臺上廣袤少下廣袤多上下廣差二丈上下袤差四丈上廣袤差三丈髙多上廣一十一丈甲縣差一千四百一十八人乙縣差三千二百二十二人夏程人功常積七十五尺限五日役臺畢羡道從臺南面起上廣多下廣一丈二尺少袤一百四尺髙多袤四丈甲縣一十三鄉乙縣四十三鄉每鄉别均賦常積六千三百尺限一日役羡道畢二縣差到人共造仰觀臺二縣鄉人共造羡道皆從先給甲縣以次與乙縣臺自下基給髙道自初登給袤問臺道廣髙袤及縣别給髙廣袤各幾何答曰臺髙一十八丈上廣七丈下廣九丈上袤一十丈下袤一十四丈甲縣給髙四丈五尺上廣八丈五尺下廣九丈上袤一十三丈下袤一十四丈乙縣給髙一十三丈五尺上廣七丈下廣八丈五尺上袤一十丈下袤一十三丈羡道髙一十八丈上廣三丈六尺下廣二丈四尺袤一十四丈甲縣鄉人給髙九丈上廣三丈下廣二丈四尺袤七丈乙縣鄉人給髙九丈上廣三丈六尺下廣三丈袤七丈術曰以程功尺數乘二縣人又以限日乘之為臺積又以上下袤差乘上下廣差三而一為隅陽羃以乘截髙為隅陽截積又半上下廣差乘斬上袤為隅頭羃以乘截髙為隅頭截積并二積以減臺積餘為實以上下廣差并上下袤差半之為正數加截上袤以乘截髙所得增隅陽羃加隅頭羃為方法又并截髙及截上袤與正數為亷法從開立方除之即得上廣各加差得臺下廣及上下袤髙求均給積尺受廣袤術曰以程功尺數乘乙縣人又以限日乘之為乙積三因之又以髙羃乘之以上下廣差乘袤差而一為實又以臺髙乘上廣廣差而一為上廣之髙又以臺髙乘上袤袤差而一為上袤之髙又以上廣之髙乘上袤之髙三之為方法又并兩髙三之二而一為廉法從開立方除之即乙髙以減本髙餘即甲髙此是從下給臺甲髙又以廣差乘乙髙如本髙而一所得加上廣即甲上廣又以袤差乘乙髙如本髙而一所得加上袤即甲上袤其甲上廣袤即乙下廣袤臺上廣袤即乙上廣袤其後求廣袤有增損者皆放此此應六因乙積臺髙再乘上下廣差乘袤差而一又以臺髙乘上廣廣差而一為上廣之髙又以臺髙乘上袤袤差而一為上袤之髙以上廣之高乘上袤之高為小羃二因下袤之髙為中羃一凡下袤下廣之髙即是截髙與上袤上廣之髙相連並數然此有中羃定有小羃一又有上廣之髙乘截髙為羃一又下廣之髙乘下袤之髙為大羃二乘上袤之髙為中羃一其大羃之中又有小羃一復有上廣上袤之髙各乘截髙為中羃各一又截髙自乘為羃一其中羃之內有小羃一又上袤之髙乘截髙為羃一然則截髙自相乘為羃二小羃六又上廣上袤之髙各三以乘截髙為羃六令皆半之故以三乘小羃又上廣上袤之髙各三今但半之各得一又二分之一故三之二而一諸羃乘截高為積尺求羡道廣袤髙術曰以均賦常積乘二縣五十六鄉又六因為積又以道上廣多下廣數加上廣少袤為下廣少袤又以髙多袤加下廣少袤為下廣少髙以乘下廣少袤為隅陽羃又以下廣少上廣乘之為鱉隅積以減積餘三而一為實並下廣少袤與下廣少高以下廣少上廣乘之為鱉從橫亷羃三而一加隅羃為方法又以三除上廣多下廣以下廣少袤下廣少高加之為亷法從開立方除之即下廣加廣差即上廣加袤多上廣於上廣即袤加高多袤即道髙求羡道均給積尺甲縣受廣袤術曰以均賦常積乘甲縣一十三鄉又六因為積以袤再乘之以道上下廣差乘臺髙為法而一為實又三因下廣以袤乘之如上下廣差而一為都亷從開立方除之即甲袤以廣差乘甲袤本袤而一以下廣加之即甲上廣又以臺髙乘甲袤本袤除之即甲髙三假令築隄西頭上下廣差六丈八尺二寸東頭上下廣差六尺二寸東頭髙少於西頭髙三丈一尺上廣多東頭髙四尺九寸正袤多於東頭髙四百七十六尺九寸甲縣六千七百二十四人乙縣一万六千六百七十七人丙縣一萬九千四百四十八人丁縣一萬二千七百八十一人四縣每人一日穿土九石九斗二升每人一日築常積一十一尺四寸十三分寸之六穿方一尺得土八斗古人負土二斗四升八合平道行一百九十二步一日六十二到今隔山渡水取土其平道只有一十一步山斜髙三十步水寬一十二步上山三當四下山六當五水行一當二平道踟蹰十加一載輸一十四步減計一人作功為均積四縣共造一日役畢今從東頭與甲其次與乙丙丁問給斜正袤與髙及下廣并每人一日自穿運築程功及隄上下髙廣各幾何答曰一人一日自穿運築程功四尺九寸六分西頭髙三丈四尺一寸上廣八尺下廣七丈六尺二寸東頭髙三尺一寸上廣八尺下廣一丈四尺二寸正袤四十八丈斜袤四十八丈一尺甲縣正袤一十九丈二尺斜袤一十九丈二尺四寸下廣三丈九尺髙一丈五尺五寸乙縣正袤一十四丈四尺斜袤一十四丈四尺三寸下廣五丈七尺六寸髙二丈四尺八寸丙縣正袤九丈六尺斜袤九丈六尺二寸下廣七丈髙三丈一尺丁縣正袤四丈八尺斜袤四丈八尺一寸下廣七丈六尺二寸髙三丈四尺一寸求人到程功運築積尺術曰置上山四十步下山二十五步渡水二十四步平道一十一步踟蹰之間十加一載輸一十四步一返計一百二十四步以古人負土二斗四升八合平道行一百九十二步以乘一日六十二到為實卻以一返步為法除得自運土到數也又以一到負土數乘之卻以穿方一尺土數除之得一人一日運功積又以一人穿土九石九斗二升以穿方一尺土數除之為法除之得穿用人數復置運功積以每人一日常積除之得築用人數並之得六人共成二十九尺七寸六分以六人除之即一人程功也求隄上下廣及髙袤術曰一人一日程功乘總人為隄積以髙差乘下廣差六而一為鱉羃又以髙差乘小頭廣差二而一為大臥塹頭羃又半髙差乘上廣多東頭髙之數為小卧塹頭羃並三羃為大小塹鱉率乘正袤多小髙之數以減隄積餘為實又置半髙差及半小頭廣差與上廣多小頭髙之數並三差以乘正袤多小頭髙之數以加率為方法又並正袤多小高上廣多小髙及半髙差兼半小頭廣差加之為亷法從開方立除之即小髙加差即各得廣袤髙又正袤自乘髙差自乘並而開方除之即斜袤求甲縣髙廣正斜袤術曰以程功乘甲縣人以六因取積又乘袤羃以下廣差乘髙差為法除之為實又並小頭上下廣以乘小髙三因之為垣頭羃又乘袤羃如法而一為垣方又三因小頭下廣以乘正袤以廣差除之為都亷從開立方除之得小頭袤即甲袤又以下廣差乘之以正袤除之所得加東頭下廣即甲廣又以兩頭髙差乘甲袤以正袤除之以加東頭髙即甲髙又以甲袤自乘以隄東頭髙減甲髙餘自乘並二位以開方除之即得斜袤若求乙丙丁各以本縣人功積尺每以前大髙廣為後小髙廣凡亷母自乘為方母亷母乘方母為實母此平隄在上羡除在下兩髙之差即除髙其除兩邊各一鱉腝中一塹堵今以袤再乘六因積廣差乘袤差而一得截鱉腝袤再自乘為立方一又塹堵袤自乘為羃一又三因小頭下廣大袤乘之廣差而一與羃為髙故為亷法又並小頭上下廣又三之以乘小頭高為頭羃意同六除然此頭羃本乘截袤又袤乘之差相乘而一今還依數乘除一頭羃為從開立方除之得截袤求隄都積術曰置西頭髙倍之加東頭髙又並西頭上下廣半而乘之又置東頭髙倍之加西頭髙又並東頭上下廣半而乘之並二位積以正袤乘之六而一得隄積也四假令築龍尾隄其隄從頭髙上闊以次低狹至尾上廣多下廣少隄頭上下廣差六尺下廣少髙一丈二尺少袤四丈八尺甲縣二千三百七十五人乙縣二千三百七十八人丙縣五千二百四十七人各人程功常積一尺九寸八分一日役畢三縣共築今從隄尾與甲縣以次與乙丙問龍尾隄從頭至尾髙袤廣及各縣别給髙袤廣各多少答曰髙三丈上廣二丈四尺下廣一丈八尺袤六丈六尺甲縣髙一丈五尺袤三丈三尺上廣二丈一尺乙縣髙二丈一尺袤一丈三尺二寸上廣二丈二尺二寸丙縣髙三丈袤一丈九尺八寸上廣二丈四尺求龍尾隄廣袤髙術曰以程功乘總人為隄積又六因之為虛積以少髙乘少袤為隅羃以少上廣乘之為鱉隅積以減虛積餘三約之所得為實並少髙袤以少上廣乘之為鱉從橫亷羃三而一加隅羃為方法又三除少上廣以少袤少髙加之為亷法從開立方除之得下廣加差即髙廣袤求逐縣均給積尺受廣袤術曰以程功乘當縣人為積尺各六因積尺又乘袤羃廣差乘髙為法除之為實又三因末廣以袤乘之廣差而一為都亷從開立方除之即甲袤以本髙乘之以本袤除之即甲髙又以廣差乘甲袤以本袤除之所得加末廣即甲上廣其甲上廣即乙末廣其甲髙即垣髙求實與都亷如前又並甲上下廣三之乘甲髙以乘袤羃以法除之得垣方從開立方除之即乙袤餘放此此龍尾猶羡除也其塹堵一鱉臑一並而相連今以袤再乘積廣差乘髙而一所得截鱉臑袤再自乘為立方一又塹堵袤自乘為羃一又三因末廣以袤乘之廣差而一與羃為髙故為亷法五假令穿河袤一里二百七十六步下廣六步一尺二寸北頭深一丈八尺六寸上廣十二步二尺四寸南頭深二百四十一尺八寸上廣八十六步四尺八寸運土於河西岸造漘北頭髙二百二十三尺二寸南頭無髙下廣四百六尺七寸五釐袤與河同甲郡二萬二千三百二十人乙郡六萬八千七十六人丙郡五萬九千九百八十五人丁郡三萬七千九百四十四人自穿負築各人程功常積三尺七寸二分限九十六日役河漘俱了四郡分共造漘其穿河自北頭先給甲郡以次與乙丙丁合均賦積尺問逐郡各給斜正袤上廣及深並漘上廣各多少答曰漘上廣五丈八尺二寸一分甲郡正袤一百四十四丈斜袤一百四十四丈三尺上廣二十六丈四寸深一十一丈一尺六寸乙郡正袤一百一十五丈二尺斜袤一百一十五丈四尺四寸上廣四十丈九尺二寸深一十八丈六尺丙郡正袤五十七丈六尺斜袤五十七丈七尺二寸上廣四十八丈三尺六寸深二十二丈三尺二寸丁郡正袤二十八丈八尺斜袤二十八丈八尺六寸上廣五十二丈八寸深二十四丈一尺八寸術曰如築隄術入之覆隄為河彼注甚明髙深稍殊程功是同意可知也以程功乘甲郡人又以隄日乘之四之三而一為積又六因以乘袤羃以上廣差乘深差為法除之為實又並小頭上下廣以乘小頭深三之為垣頭羃又乘袤羃以法除之為垣方三因小頭上廣以乘正袤以廣差除之為都亷從開立方除之即得小頭袤為甲袤求深廣以本袤及深廣差求之以兩頭上廣差乘甲袤以本袤除之所得加小頭上廣即甲上廣以小頭深減南頭深餘以乘甲袤以本袤除之所得加小頭深即甲深又正袤自乘深差自乘並而開方除之即斜袤若求乙丙丁每以前大深廣為後小深廣準甲求之即得求漘上廣術曰以程功乘總人又以限日乘之為積六因之為實以正袤除之又以髙除之所得以下廣減之餘又半之即漘上廣六假令四郡輸粟斛法二尺五寸一人作功為均自上給甲以次與乙丙丁其甲郡輸粟三萬八千七百四十五石六斗乙郡輸粟三萬四千九百五石六斗丙郡輸粟二萬六千二百七十石四斗丁郡輸粟一萬四千七十八石四斗四郡共穿窖上袤多於上廣一丈少於下袤三丈多於深六丈少於下廣一丈各計粟多少均出丁夫自穿負築冬程人功常積一十二尺一日役畢問窖上下廣袤深郡别出人及窖深廣各多少答曰窖上廣八丈上袤九丈下廣一十丈下袤一十二丈深三丈甲郡八千七十二人深一十二尺下袤一十丈二尺廣八丈八尺乙郡七千二百七十二人深九尺下袤一十一丈一尺廣九丈四尺丙郡五千四百七十三人深六尺下袤一十一丈七尺廣九丈八尺丁郡二千九百三十三人深三尺下袤一十二丈廣一十丈求窖深廣袤術曰以斛法乘總粟為積尺為實又廣差乘袤差三而一為隅陽羃乃置截上廣半廣差加之以乘截上袤為隅頭羃又半袤差乘截上廣以隅陽羃及隅頭羃加之為方法又置截上袤及截上廣並之為大廣又並廣差及袤差半之以加大廣為亷法從開立方除之即深各加差即合所問求均給積尺受廣袤深術曰如築臺術入之以斛法乘甲郡輸粟為積尺又三因以深羃乘之以廣差乘袤差而一為實深乘上廣廣差而一為上廣之髙深乘上袤袤差而一為上袤之髙上廣之髙乘上袤之髙三之為方法又並兩髙三之二而一為亷法從開立方除之即甲深以袤差乘之以本深除之所得加上袤即甲下袤以廣差乘之本深除之所得加上廣即甲下廣若求乙丙丁每以前下廣袤為後上廣袤以次皆準此求之即得若求人數各以程功約當郡積尺七假令亭倉上小下大上下方差六尺髙多上方九尺容粟一百八十七石二斗今已運出五十石四斗問倉上下方髙及餘粟深上方各多少答曰上方三尺下方九尺髙一丈二尺餘粟深上方俱六尺求倉方髙術曰以斛法乘容粟為積尺又方差自乘三而一為隅陽冪以乘截髙以減積餘為實又方差乘截髙加隅陽冪為方法又置方差加截髙為亷法從開立方除之即上方加差即合所問求餘粟髙及上方術曰以斛法乘出粟三之以乘髙冪令方差冪而一為實此是大小髙各自乘又相乘各乘取髙凡大髙者即是取髙與小髙並髙乘上方方差而一為小髙令自乘三之為方法三因小髙為亷法從開立方除之得取出髙以減本髙餘即殘粟髙置出粟髙又以方差乘之以本髙除之所得加上方即餘粟上方此本術曰上下方相乘又各自乘並以髙乘之三而一今還元三之又髙冪乘之差冪而一得大小髙相乘又各自乘之數何者若髙乘下方方差而一得大髙也若髙乘上方方差而一得小髙也然則斯本下方自乘故須髙冪乘之差自乘而一即得大髙自乘之數小髙亦然凡大髙者即是取髙與小髙並相連今大髙自乘為大方大方之內即有取髙自乘冪一隅頭小髙自乘冪一又其兩邊各有以取髙乘小髙為羃二又大小髙相乘為中方中方之內即有小髙乘取髙羃一又小髙自乘即是小方之冪又一則小髙乘大髙又各自乘三等冪皆以乘取髙為立積故三因小冪為方及三小髙為亷也八假令芻甍上袤三丈下袤九丈廣六丈髙一十二丈有甲縣六百三十二人乙縣二百四十三人夏程人功常積三十六尺限八日役自穿築二縣共造今甲縣先到問自下給髙廣袤各多少答曰髙四丈八尺上廣三丈六尺袤六丈六尺求甲縣均給積尺受廣袤術曰以程功乘乙縣人數又以限日乘之為積尺以六因之又髙冪乘之又袤差乘廣而一所得又半之為實髙乘上袤袤差而一為上袤之髙三因上袤之髙半之為亷法從開立方除之得乙髙以減甍髙餘即甲髙求廣袤依率求之此乙積本倍下袤上袤從之以下廣及髙乘之六而一為一甍積今還元須六因之以髙冪乘之為實袤差乘廣而一得取髙自乘以乘三上袤之髙則三小髙為亷法各以取髙為方仍有取髙為立方者二故半之為立方一又須半亷法九假令圓囤上小下大斛法二尺五寸以率徑一周三上下周差一丈二尺髙多上周一丈八尺容粟七百五斛六斗今已運出二百六十六石四斗問殘粟去口上下周髙各多少答曰上周一丈八尺下周三丈髙三丈六尺去口一丈八尺粟周二丈四尺求圓囤上下周及髙術曰以斛法乘容粟又三十六乘之三而一為方亭之積又以周差自乘三而一為隅陽冪以乘截髙以減亭積餘為實又周差乘截髙加隅陽冪為方法又以周差加截髙為亷法從開立方除之得上周加差而合所問求粟去口術曰以斛法乘出斛三十六乘之以乘髙冪如周差冪而一為實髙乘上周周差而一為小髙令自乘三之為方法三因小髙為亷法從開立方除之即去口三十六乘訖即是截方亭與前方窖不别置去口以周差乘之以本髙除之所得加上周即粟周一假令有粟二萬三千一百二十斛七斗三升欲作方倉一圓窖一盛各滿中而粟適盡令髙深等使方面少於圓徑九寸多於髙二丈九尺八寸率徑七周二十二問方徑深各多少答曰倉方四丈五尺三寸容粟一萬二千七百二十二斛九斗五升八合窖徑四丈六尺二寸容粟一萬三百九十七石七斗七升二合髙與深各一丈五尺五寸求方徑髙深術曰十四乘斛法以乘粟數二十五而一為實又倍多加少以乘少數又十一乘之二十五而一多自乘加之為方法又倍少數十一乘之二十五而一又倍多加之為亷法從開立方除之即髙深各加差即方徑一十四乘斛法以乘粟為積尺前一十四除今還元一十四乘為徑自乘者一十一方自乘者一十四故並之為二十五凡此方圓二徑長短不同二徑各自乘為方大小各别然則此截方二丈九尺八寸截徑三丈七寸皆成方面此應截方自乘一十四乘之塹徑自乘一十一乘之二十五而一為隅冪即方法也但二隅冪皆以截數為方面今此術就省倍小隅方加差為矩袤以差乘之為矩冪一十一乘之二十五而一又差自乘之數即是方圓之隅同有此此數若二十五乘之還須二十五除直以差自乘加之故不復乘除又須倍二亷之差一十一乘之二十五而一倍差加之為亷法不復二十五乘除之也還元術曰倉方自乘以髙乘之為實圓徑自乘以深乘之一十一乘一十四而一為實皆以斛法除之即得容粟斛法二尺五寸一一假令有粟一萬六千三百四十八石八斗欲作方倉四圓窖三令髙深等方面少於圓徑一丈多於髙五尺斛法二尺五寸率徑七周二十二問方髙徑各多少答曰方一丈八尺髙深一丈三尺圓徑二丈八尺術曰以一十四乘斛法以乘粟數如八十九而一為實倍多加少以乘少數三十三乘之八十九而一多自乘加之為方法又倍少數以三十三乘之八十九而一倍多加之為亷法從開立方除之即髙深各加差即方徑一十四乘斛法以乘粟為徑自乘及方自乘數與前同今方倉四即四因十四圓窖三即三因十一並之為八十九而一此截徑一丈五尺截方五尺以髙為立方自外意同前一二假令有粟三千七十二石欲作方倉一圓窖一令徑與方等方多於窖深二尺少於倉髙三尺盛各滿中而粟適盡圓率斛法並與前同問方徑髙深各多少答曰方徑各一丈六尺髙一丈九尺深一丈四尺術曰三十五乘粟二十五而一為率多自乘以并多少乘之以乘一十四如二十五而一所得以減率餘為實並多少以乘多倍之乘一十四如二十五而一多自乘加之為方法又並多少以乘一十四如二十五而一倍多加之為廉法從開立方除之即窖深各加差即方徑髙截髙五尺截徑及方二尺以深為立方十四乘斛法故三十五乘粟多自乘並多少乘之為截髙隅積即二亷方各二尺長五尺自外意旨皆與前同一三假令有粟五千一百四十五石欲作方窖圓窖各一令口小底大方面與圓徑等兩深亦同其深少於下方七尺多於上方一丈四尺盛各滿中而粟適盡圓率斛法並與前同問方徑深各多少答曰上方徑各七尺下方徑各二丈八尺深各二丈一尺術曰以四十二乘斛法以乘粟七十五而一為方亭積令方差自乘三而一為隅陽冪以截多乘之減積餘為實以多乘差加冪為方法多加差為亷法從開立方除之即上方加差即合所問凡方亭上下方相乘又各自乘並以乘髙為虛命三而一為方亭積若圓亭上下徑相乘又各自乘並以乘髙為虛又十一乘之四十二而一為圓亭積今方圓二積並在一處故以四十二復乘之即得圓虛十一方虛十四凡二十五而一得一虛之積又三除虛積為方亭實乃依方亭覆問法見上下方差及髙差與積求上下方髙術入之故三乘二十五而一一四假令有粟二萬六千三百四十二石四斗欲作方窖六圓窖四令口小底大方面與圓徑等其深亦同令深少於下方七尺多於上方一丈四尺盛各滿中而粟適盡圓率斛法並與前同問上下方深數各多少答曰方窖上方七尺下方二丈八尺深二丈一尺圓窖上下徑與方窖同術曰以四十二乘斛法以乘粟三百八十四而一為方亭積尺令方差自乘三而一為隅陽冪以多乘之以減積餘為實以多乘差加冪為方法又以多加差為亷法從開立方除之即上方加差即合所問今以四十二乘圓虛十一者四方虛十四者六合一百二十八虛除之為一虛之積得者仍三而一為方亭實積乃依方亭見差覆問求之故三乘一百二十八除之一五假令有句股相乘冪七百六五十分之一弦多於句三十六十分之九問三事各多少答曰句十四二十分之七股四十九五分之一弦五十一四分之一術曰冪自乘倍多數而一為實半多數為廉法從開立方除之即句以弦多句加之即弦以句除冪即股句股相乘冪自乘即句冪乘股冪之積故以倍句弦差而一得一句與半差相連乘句冪為方故半差為亷法從開立方除之一六假令有句股相乘冪四千三十六五分之一股少於弦六五分之一問弦多少答曰弦一百一十四十分之七術曰冪自乘倍少數而一為實半少為亷法從開立方除之即股加差即弦一七假令有句弦相乘冪一千三百三十七二十分之一弦多於股一十分之一問股多少答曰九十二五分之二術曰冪自乘倍多而一為立羃又多再自乘半之減立冪餘為實又多數自乘倍之為方法又置多數五之二而一為亷法從開立方除之即股句弦相乘冪自乘即句冪乘弦羃之積故以倍股弦差而一得一股與半差為方今多再自乘半之為隅橫虛二立廉倍之為從隅多為上廉即二多法故五之二而一一八假令有股弦相乘冪四千七百三十九五分之三句少於弦五十四五分之二問股多少答曰六十八術曰冪自乘倍少數而一為立冪又少數再自乘半之以減立冪餘為實又少數自乘倍之為方法又置少數五之二而一為廉法從開立方除之即句加差即弦弦除冪即股一九假令有股弦相乘冪七百二十六句七十分之七問股多少答曰股二十六五分之二術曰冪自乘為實句自乘為方法從開立方除之所得又開方即股數亦是股為長以股得股冪又開股北分母常二假令有股十六二分之一句弦相乘冪一百六十四二十五分之十四問句多少答曰句八五分之四術曰冪自乘為實股自乘為實股自乘為方法從開方除之所得又開方即句
