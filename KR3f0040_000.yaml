body:
  text: 上緝古算術表臣孝通言臣聞九疇載敘紀法著於彛倫六藝成功數術參於造化夫為君上者司牧黔首有神道而設教采能事而經綸盡性窮源莫重於算昔周公制禮有九數之名竊尋九數即九章是也其理幽而微其形祕而約重句聊用測海寸木可以量天非宇宙之至精其孰能與於此者漢代張蒼刪補殘缺校其條目頗與古術不同魏朝劉徽篤好斯言博綜纎隱更為之注徽思極毫芒觸類增長乃造重差之法列於終篇雖即未為司南然亦一時獨步自兹厥後不繼前蹤賀循徐嶽之徒王彪甄鸞之輩會通之數無聞焉耳但舊經殘駮尚有闕漏自劉以下更不足言其祖暅之綴術時人稱之精妙曾不覺方邑進行之術全錯不通芻甍方亭之問於理未盡臣今更作新術於此附伸臣長自閭閻少小學算鐫磨愚鈍迄將皓首鑽尋祕奧曲盡無遺代乏知音終成寡和伏蒙聖朝收拾用臣為太史丞比年已來奉敕校勘傅仁均曆凡駮正術錯三十餘道即付太史施行伏尋九章商功篇有平地役功受袤之術至于上寬下狹前高後卑正經之內闕而不論致使今代之人不達深理就平正之聞同欹邪之用斯乃圎孔方枘如何可安臣晝思夜想臨書浩歎恐一旦瞑目將來莫覩遂於平地之餘續狹斜之法凡二十術名曰緝古請訪能算之人考論得失如有排其一字臣欲謝以千金輕用陳聞伏深戰悚謹言
