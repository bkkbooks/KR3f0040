body:
  text: 緝古算經天文算法類二算書之屬提要臣等謹案緝古算經一卷唐王孝通撰其結銜稱通直郎太史丞其始末未詳惟唐書律厯志戊寅厯條下有武徳九年校厯人算厯博士臣王孝通題盖即其人也是書一名緝古算術唐書藝文志崇文總目俱稱李淳風注今案此本卷首實題孝通撰并注則唐志及總目為誤又宋志作一卷唐志鄭樵藝文畧俱作四卷王應麟玉海謂今亡其三案孝通原表稱二十術檢勘書内條目相同並無缺佚不知應麟何所據而云然也書中大㫖以九章商功篇有平地役功受袤之術其於上寛下狭前髙後卑闕而不論世人多不達其理因於平地明其法凡推朔夜半時月之所離者一術推仰觀臺及羡道高廣袤者一術推築堤授工上下廣及髙袤不同者一術推築龍尾堤者一術推穿河授工斜正袤上廣及深并漘上廣不同者一術推四郡輸粟窖上下廣袤餘郡别出人及窖深廣者一術推亭倉上下方髙者一術推芻甍圓囤者各一求推方倉圓窖對待者五術推勾股邊積亘求者六術共合二十術之數中間毎以人户道里大小逺近及材物之輕重工作之時日乗除進退叅伍以得其法頗不以深淺為次第故讀者或不能驟通而卒篇以後由源竟委端緒足尋洵為思極毫芒曲盡事理唐代明算立學習此書者以三年為限亦知其術之精妙非旦夕所克竟其義矣其書世罕流播此乃宋元豐七年秘書監趙彦若等校定刋行舊本常熟毛扆得之章邱李氏而影抄傳之者今詳加勘正其文間有脱闕不敢妄補謹撮取其義别加圖説附諸本文之左以便觀覽云乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
