body:
  text: 緝古算經䟦按唐書選舉志制科之目明算居一其定制云凡算學孫子五曹共限一嵗九章海島共三嵗張邱建夏侯陽各一嵗周髀五經算共一嵗綴術四嵗緝古三嵗記遺三等數皆兼習之竊惟數學為六藝之一唐以取士共十經周髀家塾曾刋行之餘則世有不能舉其名者扆半生求之從太倉王氏得孫子五曹張邱建夏侯陽四種從章邱李氏得周髀緝古二種後從黄俞邰又得九章皆元豐七年秘書省刋板字畫端楷雕鏤精工真世之寳也每卷後有秘書省官銜姓名一幅又一幅宰輔大臣自司馬相公而下俱列名於後用見當時鄭重若此因求善書者刻畫影摹不爽毫末什襲而藏之但焉得海島五經綴術三種竟成完璧并得好事者刋刻流布俾數學不絶於世所深願也康熙甲子仲秋汲古後人毛扆謹識
